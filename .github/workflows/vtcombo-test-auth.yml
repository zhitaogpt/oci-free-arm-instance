name: VTcombo Auth Test
on:
  workflow_dispatch:

jobs:
  test-grvt-auth:
    runs-on: ubuntu-latest
    steps:
      - name: Test GRVT Auth from GitHub Actions
        run: |
          echo "=== Runner IP ==="
          curl -s https://api.ipify.org && echo ""
          echo "=== Full Response with Headers ==="
          curl -sv -X POST https://edge.testnet.grvt.io/auth/api_key/login \
            -H "Content-Type: application/json" \
            -d "{\"api_key\": \"${{ secrets.GRVT_API_KEY }}\", \"secret\": \"${{ secrets.GRVT_API_SECRET }}\"}" 2>&1
