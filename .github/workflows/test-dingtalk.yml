name: Test DingTalk Notification
on:
  workflow_dispatch:

jobs:
  test-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send DingTalk Test
        run: |
          curl -s -H 'Content-Type: application/json' \
            -d '{"msgtype":"text","text":{"content":"-info: GitHub Actions 钉钉通知测试成功！workflow 正常运行中。"}}' \
            "${{ secrets.DINGTALK_WEBHOOK }}"
